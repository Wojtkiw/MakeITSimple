# Jeden, stały CIEMNY motyw (zrezygnowaliśmy z jasnego). base="dark" sprawia, że apka
# otwiera się na ciemno domyślnie, także na Streamlit Cloud - niezależnie od przeglądarki.
# Kolory dobrane pod karty: secondaryBackgroundColor = tło karty (#1a1a24).
[theme]
base = "dark"
backgroundColor = "#0d0d12"
secondaryBackgroundColor = "#1a1a24"
textColor = "#e8e6e0"
primaryColor = "#ef5350"
